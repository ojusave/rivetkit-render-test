services:
  - type: web
    name: rivetkit-hello-world
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: starter
    envVars:
      - key: RIVET_ENDPOINT
        sync: false
      - key: RIVET_PUBLIC_ENDPOINT
        sync: false
      - key: RIVET_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
